<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos de HTML</title>
    <!-- Icono .ico para poner en la parte superiror al lado del nombre de la página -->
    <link rel="icon" href="assets/icono_HTML.ico" />
    <!-- Enlace a un archivo CSS de mi proyecto -->
    <link rel="stylesheet" href="./CSS/Fundamentos_HTML.css"/>
    <!-- Enlace a un archivo CSS externo Playwright Cuba -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crafty+Girls&display=swap" rel="stylesheet">
</head>
<body>
    <h1 id="titulo-principal">Fundamentos de HTML</h1>
    <div>
        <p>Hola a todos desde un div</p>
    </div>
    <section>
        <h2>Mamíferos</h2>
        <p>Los mamíferos son animales de sangre caliente con pelaje o pelo joven</p>
        <ul>
            <li>León</li>
            <li>Elefante</li>
            <li>Delfín</li>
        </ul>
    </section>
    <div class="box red-box"></div>
    <div class="box blue-box"></div>
    <div class="box red-box"></div>
    <div class="box blue-box"></div>

    <!-- Entidades en HTML -->
    <!-- Referencia por carácter -->
    <p>This is an &lt;img /&gt; element</p>
    
    <!-- Referencia por entidad numérica -->
    &#60;
    &#169;
    &#174;

    <!-- Referencia por entidad numérica hexadecimal -->
    &#x20AC;
    &#x03A9;
    &#x3C;

    <script>
        alert("Hola desde JavaScript");
    </script>
    <!-- Enlace a un archivo JavaScript externo -->
    <script src="path-to-javascript-file.js"></script>
