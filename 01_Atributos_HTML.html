<!DOCTYPE html>
<!-- Idioma de la página -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer HTML</title>
    <!-- Icono .ico para poner en la parte superiror al lado del nombre de la página -->
     <link rel="icon" href="assets/icono_vaca.ico" />
    <!-- Enlace a un archivo CSS de mi proyecto -->
    <link rel="stylesheet" href="./CSS/estilos.css"/>
    <!-- Enlace a un archivo CSS externo Playwright Cuba -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <!-- Enlace a un icon en la parte superior al lado del título -->
    <link rel="icon" href="favicon.ico" />
</head>
<body>
    
    <!-- H1 del documento -->
    <h1>Main heading element</h1>
    
    <!-- parrafo del documento -->
    <p>I love coding!</p>
    
    <!-- imagen del documento -->
    <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg" alt="Two cats running in the dirt."/>

    <!-- Enlaces -->
    <a href="https://www.freecodecamp.org/news/" target="_blank">Visit FreeCodeCamp News</a>

    <!-- Input -->
    <input type="checkbox" checked>
    <input type="text" disabled>

    <!-- Lista desordenada -->
    <ul>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ul>

    <!-- Lista ordenada -->
    <ol>
        <li>Primer elemento</li>
        <li>Segundo elemento</li>
        <li>Tercer elemento</li>
    </ol>

</body>
</html>
